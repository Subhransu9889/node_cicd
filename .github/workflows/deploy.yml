name: Deploy to the ExCloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy on ExCloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 210.79.129.39
          username: ubuntu
          key: ${{ secrets.EXCLOUD_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
              nvm use default >/dev/null 2>&1 || true
            elif [ -f "$HOME/.bashrc" ]; then
              . "$HOME/.bashrc"
            elif [ -f "$HOME/.profile" ]; then
              . "$HOME/.profile"
            fi

            if ! command -v node >/dev/null 2>&1; then
              echo "Node.js is not available on the target server."
              exit 1
            fi

            if ! command -v npm >/dev/null 2>&1; then
              echo "npm is not available on the target server."
              exit 1
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            cd /home/ubuntu/node_cicd
            git pull
            npm install
            pm2 restart all
