name: Deploy to the ExCloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy on ExCloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 210.79.129.39
          username: ubuntu
          key: ${{ secrets.EXCLOUD_KEY }}
          script: |
            cd /home/ubuntu/node_cicd
            git pull
            npm install
            pm2 restart all
